name: Build Snes9x EX+

on:
  workflow_dispatch: 
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
        
      - name: Build
        run: |
          cd Snes9x
          make -f android.mk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Snes9xEXPlus
          path: ./*.apk

name: Build Snes9x EX+

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          
      - name: Build with make
        run: |
          cd Snes9x
          make -f android.mk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Snes9xEXPlus
          path: ./**/*.apk
